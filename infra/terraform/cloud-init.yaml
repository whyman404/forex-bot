#cloud-config
# ============================================================================
# infra/terraform/cloud-init.yaml — bootstrap the Linux VPS.
# ============================================================================
# Installed:
#   - docker + compose plugin
#   - cloudflared (Tunnel agent)
#   - fail2ban, unattended-upgrades
#   - non-root deploy user
# ============================================================================

users:
  - name: deploy
    groups: [sudo, docker]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys: []  # injected via Terraform later

package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - jq
  - htop
  - rsync
  - postgresql-client-16
  - awscli  # for R2 (S3-compatible) backups

write_files:
  - path: /etc/apt/keyrings/docker.gpg
    permissions: "0644"
    content: |
      # placeholder — actual key fetched by runcmd
  - path: /etc/systemd/system/cloudflared.service
    content: |
      [Unit]
      Description=Cloudflare Tunnel
      After=network.target
      [Service]
      Type=simple
      ExecStart=/usr/local/bin/cloudflared tunnel --no-autoupdate run --token ${cloudflare_tunnel_token}
      Restart=always
      RestartSec=5
      User=root
      [Install]
      WantedBy=multi-user.target

runcmd:
  # === docker ===
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # === cloudflared ===
  - curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
  - chmod +x /usr/local/bin/cloudflared
  - systemctl daemon-reload
  - systemctl enable --now cloudflared

  # === firewall ===
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw --force enable

  # === unattended security upgrades ===
  - dpkg-reconfigure -plow unattended-upgrades

  # === volumes ===
  - mkdir -p /data
  - echo "UUID=$(blkid -s UUID -o value /dev/sdb) /data ext4 defaults 0 2" >> /etc/fstab
  - mount -a || true

  # === app dir ===
  - mkdir -p /opt/forex-bot
  - chown -R deploy:deploy /opt/forex-bot

  - echo "VPS ready — pull repo, copy .env, run docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d" > /etc/motd
