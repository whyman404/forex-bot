# --------------------------------------------------------------------------
# .github/workflows/deploy-vercel.yml — Optional explicit Vercel deploy
# --------------------------------------------------------------------------
# Vercel's GitHub integration already auto-deploys on push to main. This
# workflow is for the case where you want gating (e.g. require ci.yml to
# pass first) or to deploy from a non-default branch.
#
# Required GitHub secrets:
#   VERCEL_TOKEN          — Vercel → Account Settings → Tokens
#   VERCEL_ORG_ID         — `vercel link` → .vercel/project.json → orgId
#   VERCEL_PROJECT_ID     — same file → projectId
# --------------------------------------------------------------------------

name: deploy-vercel

on:
  workflow_run:
    workflows: ["ci"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target (production | preview)"
        required: true
        default: "production"
        type: choice
        options: [production, preview]

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.preview-url }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: install vercel cli
        run: npm i -g vercel@latest

      - name: pull vercel project info
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes \
            --environment=${{ inputs.environment || 'production' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: build (vercel)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ inputs.environment || 'production' }}" = "production" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: deploy
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ inputs.environment || 'production' }}" = "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "preview-url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL" >> $GITHUB_STEP_SUMMARY

      - name: smoke test
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS "${{ steps.deploy.outputs.preview-url }}" > /dev/null && break
            echo "attempt $i failed, retrying..."
            sleep 5
          done
