# ============================================================================
# infra/prometheus/prometheus.yml
# ============================================================================
# Owner: Hestia Kaoru
# Targets all forex-bot services on the `observability` network (docker DNS).
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: forex-bot
    env: ${APP_ENV:-development}

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Add Alertmanager once we deploy it. Grafana also fires alerts.
            # - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend
          component: api

  - job_name: trading-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["trading-engine:9100"]
        labels:
          service: trading-engine
          component: engine

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: cadvisor

  - job_name: mt5-supervisor
    # Windows VPS pushes metrics here via Cloudflare Tunnel or VPN.
    # For now, scrape via static host. Replace with file_sd or DNS SRV later.
    scheme: https
    tls_config:
      insecure_skip_verify: false
    static_configs:
      - targets: ["mt5-supervisor.internal:9101"]
        labels:
          service: mt5-supervisor
          location: windows-vps
