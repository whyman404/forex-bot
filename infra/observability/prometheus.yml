# ============================================================================
# prometheus.yml — Forex Bot Platform
# ============================================================================
# Dev scrape config. Backend exposes /metrics (FastAPI + prometheus_client).
# Trading engine exports metrics via the same registry. mt5-bridge-stub does
# not expose metrics (it's a dev stub).
# ============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: forex-bot-dev
    env: development

# Alert rules will be added under ./rules/ in Phase 2.
rule_files: []
  # - /etc/prometheus/rules/*.yml

# alertmanager kept commented until Phase 2.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # --------- prometheus self-monitoring ---------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --------- backend (FastAPI /metrics) ---------
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend
          tier: app

  # --------- frontend (Next.js custom /api/metrics if implemented) ---------
  - job_name: frontend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["frontend:3000"]
        labels:
          service: frontend
          tier: app

  # --------- trading-engine (Python http_server prometheus_client) ---------
  - job_name: trading-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["trading-engine-worker:9000"]
        labels:
          service: trading-engine
          tier: worker

  # --------- mt5-bridge-stub ---------
  - job_name: mt5-bridge-stub
    metrics_path: /metrics
    static_configs:
      - targets: ["mt5-bridge-stub:8500"]
        labels:
          service: mt5-bridge
          tier: bridge
    honor_labels: true
