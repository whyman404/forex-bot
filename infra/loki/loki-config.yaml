# ============================================================================
# infra/loki/loki-config.yaml — single-binary Loki, dev/MVP scale.
# ============================================================================
# Storage: filesystem (good up to ~1k req/s). Migrate to S3/R2 in Phase 3.
# Retention: 30 days (controlled by `compactor.retention_period`).
# ============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  retention_period: 720h # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_lookback: 720h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  per_stream_rate_limit: 4MB
  per_stream_rate_limit_burst: 8MB
  max_entries_limit_per_query: 5000
  max_global_streams_per_user: 10000

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules-temp
  rule_path: /loki/rules
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
