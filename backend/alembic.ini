; -------------------------------------------------------------------------
; Alembic configuration — forex-bot backend
; Author: Mnemosyne Rin
;
; sqlalchemy.url is NOT set here on purpose:
;   env.py reads it from app.core.config.get_settings().database_url
;   so the same .env drives both runtime and migrations.
;
; Async-aware: env.py uses create_async_engine + run_sync.
; -------------------------------------------------------------------------

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

; Format used to generate migration filenames: 0001_<slug>.py style.
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

; Recommended: timezone-aware timestamps in script template.
timezone = UTC

; Source of DB URL: env.py reads from Settings — DO NOT put a real URL here.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

; -------------------------------------------------------------------------
; Logging
; -------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
