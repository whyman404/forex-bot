# ============================================================================
# .github/workflows/ci.yml — CI for Forex Bot Platform
# ============================================================================
# Runs on every push and PR. Matrix:
#   - backend-tests     (Python 3.12, uv, ruff, mypy, pytest)
#   - frontend-tests    (Node 20, pnpm, lint, typecheck, vitest, build)
#   - trading-engine    (Python 3.12, ruff, pytest)
#   - docker-build      (build all images via compose)
#   - security-scan     (pip-audit, npm audit, trivy)
#
# Owner: Hestia Kaoru. Cache aggressively. Fail fast on lint, slow on tests.
# ============================================================================

name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # --------------------------------------------------------------------------
  # Backend
  # --------------------------------------------------------------------------
  backend-tests:
    name: backend / python ${{ env.PYTHON_VERSION }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forexbot
          POSTGRES_PASSWORD: forexbot
          POSTGRES_DB: forexbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forexbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: install deps
        run: uv sync --frozen --all-extras --dev || uv pip install --system -e ".[dev]" || uv pip install --system -e .

      - name: ruff (lint)
        run: uv run ruff check app tests || ruff check app tests

      - name: ruff (format check)
        run: uv run ruff format --check app tests || ruff format --check app tests

      - name: mypy (types)
        run: uv run mypy app || mypy app || true
        continue-on-error: true

      - name: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://forexbot:forexbot@localhost:5432/forexbot_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-not-real
          ENCRYPTION_KEK: dGVzdGtla2RvbnRyZXVzZWFueXdoZXJlMzJieXRlcw==
        run: uv run pytest -q --cov=app --cov-report=xml --cov-report=term-missing || pytest -q

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  # --------------------------------------------------------------------------
  # Frontend
  # --------------------------------------------------------------------------
  frontend-tests:
    name: frontend / node ${{ env.NODE_VERSION }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: install deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck || pnpm tsc --noEmit

      - name: unit tests (vitest)
        run: pnpm test -- --run --reporter=verbose
        env:
          CI: "true"

      - name: build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXTAUTH_SECRET: ci-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
        run: pnpm build

  # --------------------------------------------------------------------------
  # Trading Engine
  # --------------------------------------------------------------------------
  trading-engine-tests:
    name: trading-engine / python ${{ env.PYTHON_VERSION }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: trading-engine

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "trading-engine/pyproject.toml"

      - name: install deps
        run: uv pip install --system -e ".[dev]" || uv pip install --system -e .

      - name: ruff
        run: ruff check . || true
        continue-on-error: true

      - name: pytest
        run: pytest -q

  # --------------------------------------------------------------------------
  # Docker build
  # --------------------------------------------------------------------------
  docker-build:
    name: docker / build all images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend-tests, frontend-tests, trading-engine-tests]

    steps:
      - uses: actions/checkout@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          target: runtime
          push: false
          load: true
          tags: forex-bot/backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: forex-bot/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: build trading-engine image
        uses: docker/build-push-action@v5
        with:
          context: trading-engine
          file: trading-engine/Dockerfile
          push: false
          load: true
          tags: forex-bot/trading-engine:ci
          cache-from: type=gha,scope=engine
          cache-to: type=gha,mode=max,scope=engine

      - name: build mt5-bridge-stub image
        uses: docker/build-push-action@v5
        with:
          context: infra/docker/mt5-bridge-stub
          file: infra/docker/mt5-bridge-stub/Dockerfile
          push: false
          load: true
          tags: forex-bot/mt5-bridge-stub:ci
          cache-from: type=gha,scope=stub
          cache-to: type=gha,mode=max,scope=stub

      - name: compose config validate
        run: docker compose -f infra/docker-compose.yml --project-directory . config -q

  # --------------------------------------------------------------------------
  # Security scan
  # --------------------------------------------------------------------------
  security-scan:
    name: security / scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          cd backend && pip-audit -r <(pip install -e . --dry-run 2>/dev/null; pip freeze) || true
        continue-on-error: true

      - name: pip-audit (trading-engine)
        run: |
          cd trading-engine && pip-audit -r <(pip install -e . --dry-run 2>/dev/null; pip freeze) || true
        continue-on-error: true

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: npm audit (frontend)
        run: cd frontend && pnpm install --frozen-lockfile && pnpm audit --audit-level=high || true
        continue-on-error: true

      - name: trivy fs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: upload trivy sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Aggregator (required check)
  # --------------------------------------------------------------------------
  ci-pass:
    name: ci / pass
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, trading-engine-tests, docker-build, security-scan]
    if: always()
    steps:
      - name: gate
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then echo "backend failed"; exit 1; fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then echo "frontend failed"; exit 1; fi
          if [[ "${{ needs.trading-engine-tests.result }}" != "success" ]]; then echo "engine failed"; exit 1; fi
          if [[ "${{ needs.docker-build.result }}" != "success" ]]; then echo "docker build failed"; exit 1; fi
          echo "ci passed"
