# ============================================================================
# .github/workflows/deploy.yml — deploy to VPS via SSH
# ============================================================================
# Manual trigger only — no auto-deploy on push. User picks env: staging | prod.
#
# Flow:
#   1. checkout
#   2. build + push images to GHCR
#   3. SSH to target VPS
#   4. pull new images, run migrations, blue-green swap, smoke check
#   5. notify Discord
#
# Required secrets (per env):
#   {STG,PROD}_SSH_HOST
#   {STG,PROD}_SSH_USER
#   {STG,PROD}_SSH_KEY     (private key, ed25519)
#   {STG,PROD}_SSH_PORT    (default 22)
#   DISCORD_WEBHOOK_URL
# ============================================================================

name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: target environment
        required: true
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: image tag to deploy (default = sha)
        required: false
        type: string
      skip_migration:
        description: skip alembic migrations (dangerous)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/forex-bot

jobs:

  # --------------------------------------------------------------------------
  # Build & push images
  # --------------------------------------------------------------------------
  build-push:
    name: build & push images → ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: derive image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "deploying tag: ${TAG}"

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.event.inputs.environment }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.event.inputs.environment }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: build & push trading-engine
        uses: docker/build-push-action@v5
        with:
          context: trading-engine
          file: trading-engine/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/trading-engine:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/trading-engine:${{ github.event.inputs.environment }}
          cache-from: type=gha,scope=engine
          cache-to: type=gha,mode=max,scope=engine

  # --------------------------------------------------------------------------
  # Deploy
  # --------------------------------------------------------------------------
  deploy:
    name: deploy → ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-push
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: select secrets by env
        id: secrets
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "production" ]]; then
            echo "host=${{ secrets.PROD_SSH_HOST }}" >> "$GITHUB_OUTPUT"
            echo "user=${{ secrets.PROD_SSH_USER }}" >> "$GITHUB_OUTPUT"
            echo "port=${{ secrets.PROD_SSH_PORT || '22' }}" >> "$GITHUB_OUTPUT"
            echo "::add-mask::${{ secrets.PROD_SSH_KEY }}"
            printf '%s' "${{ secrets.PROD_SSH_KEY }}" > /tmp/deploy_key
          else
            echo "host=${{ secrets.STG_SSH_HOST }}" >> "$GITHUB_OUTPUT"
            echo "user=${{ secrets.STG_SSH_USER }}" >> "$GITHUB_OUTPUT"
            echo "port=${{ secrets.STG_SSH_PORT || '22' }}" >> "$GITHUB_OUTPUT"
            echo "::add-mask::${{ secrets.STG_SSH_KEY }}"
            printf '%s' "${{ secrets.STG_SSH_KEY }}" > /tmp/deploy_key
          fi
          chmod 600 /tmp/deploy_key

      - name: setup ssh known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ steps.secrets.outputs.port }} -H ${{ steps.secrets.outputs.host }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: deploy via ssh
        env:
          HOST: ${{ steps.secrets.outputs.host }}
          USER: ${{ steps.secrets.outputs.user }}
          PORT: ${{ steps.secrets.outputs.port }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          SKIP_MIGRATION: ${{ github.event.inputs.skip_migration }}
        run: |
          ssh -i /tmp/deploy_key -p "$PORT" "$USER@$HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd /opt/forex-bot

          echo ">> pulling code"
          git fetch --all --tags
          git reset --hard origin/main

          echo ">> writing IMAGE_TAG=$IMAGE_TAG"
          if grep -q "^IMAGE_TAG=" .env; then
            sed -i.bak "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "IMAGE_TAG=$IMAGE_TAG" >> .env
          fi

          echo ">> docker login ghcr"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          echo ">> docker compose pull"
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml --project-directory . pull

          if [[ "$SKIP_MIGRATION" != "true" ]]; then
            echo ">> alembic upgrade head"
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml --project-directory . \
              run --rm backend alembic upgrade head
          else
            echo ">> SKIPPING migrations (skip_migration=true)"
          fi

          echo ">> docker compose up -d --remove-orphans"
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml --project-directory . \
            up -d --remove-orphans --pull always

          echo ">> waiting for backend healthy"
          for i in {1..30}; do
            if curl -sf -m 3 http://127.0.0.1:8000/healthz >/dev/null; then
              echo "backend healthy"
              break
            fi
            sleep 2
          done

          echo ">> smoke"
          ./scripts/smoke.sh
          REMOTE

      - name: rollback on failure
        if: failure()
        run: |
          ssh -i /tmp/deploy_key -p ${{ steps.secrets.outputs.port }} \
            ${{ steps.secrets.outputs.user }}@${{ steps.secrets.outputs.host }} bash -s <<'REMOTE'
          set -euo pipefail
          cd /opt/forex-bot
          echo ">> rolling back to previous image tag"
          if [[ -f .env.bak ]]; then
            mv .env.bak .env
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml --project-directory . \
              up -d --remove-orphans
          else
            echo "no .env.bak — manual rollback required"
          fi
          REMOTE

      - name: cleanup ssh key
        if: always()
        run: rm -f /tmp/deploy_key

  # --------------------------------------------------------------------------
  # Notify
  # --------------------------------------------------------------------------
  notify:
    name: notify discord
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always()

    steps:
      - name: send discord webhook
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ needs.deploy.result }}"
          COLOR=3066993  # green
          [[ "$STATUS" == "failure" ]] && COLOR=15158332  # red
          [[ "$STATUS" == "cancelled" ]] && COLOR=10070709  # grey

          curl -X POST -H 'Content-Type: application/json' \
            -d @- "${{ secrets.DISCORD_WEBHOOK_URL }}" <<JSON
          {
            "embeds": [{
              "title": "Forex Bot deploy — ${{ github.event.inputs.environment }}",
              "description": "Status: **$STATUS**\nTag: \`${{ needs.build-push.outputs.image_tag }}\`\nActor: ${{ github.actor }}",
              "color": $COLOR,
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }
          JSON
