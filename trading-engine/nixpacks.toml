# --------------------------------------------------------------------------
# nixpacks.toml — Trading Engine (FastAPI server + live engine worker)
# Note: MetaTrader5 extra is platform_system == 'Windows' only — Railway
# runs Linux so it's a no-op here. The live worker talks to the Windows
# MT5 bridge over Tailscale/HTTPS via MT5_BRIDGE_URL.
# --------------------------------------------------------------------------

providers = ["python"]

[variables]
PYTHON_VERSION = "3.12"
NIXPACKS_PYTHON_VERSION = "3.12"
PIP_NO_CACHE_DIR = "1"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

[phases.setup]
nixPkgs = ["python312", "gcc", "libffi", "openssl", "curl"]
aptPkgs = ["build-essential"]

[phases.install]
cmds = [
  "pip install --upgrade pip uv",
  "uv pip install --system -e .",
]

[phases.build]
cmds = [
  "python -m compileall . || true",
]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8500} --proxy-headers --forwarded-allow-ips='*'"
